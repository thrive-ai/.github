name: Feature request / enhancement
description: Propose a change or new capability
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operational problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A sketch of the approach — detail is welcome but not required.
    validations:
      required: true

  - type: textarea
    id: affected
    attributes:
      label: Affected components
      description: Which APIs / services / frontends / edge components would this touch? (See DESIGN-01 §4 for the component list.)

  - type: dropdown
    id: data_class
    attributes:
      label: Data class impact
      description: Does this introduce, change, or move a data class? (POL-A8.25 §6.1)
      options:
        - No new data / no class change
        - New telemetry field or derived data
        - New or changed auth / tenant-routing data
        - New customer PII
        - New curation / presentation config
        - Other — describe above
    validations:
      required: true

  - type: dropdown
    id: external
    attributes:
      label: New external dependency?
      options:
        - No
        - Yes — new outbound SaaS or API
        - Yes — new inbound integration / webhook
    validations:
      required: true

  - type: textarea
    id: trust_boundary
    attributes:
      label: Trust-boundary impact
      description: Does this cross, add, or change a trust boundary (DESIGN-01 §6)? If so, architectural review is required (POL-A8.27 §7.1) before coding starts.

  - type: textarea
    id: regulatory_inputs
    attributes:
      label: Regulatory / statutory inputs
      description: Any statutory, regulatory or contractual obligation that constrains this change? Most commonly UK GDPR / DPA 2018 if PII is involved (cite the relevant row in `registers/Personal_Information_Processing_Register__Register.csv`); also customer-contract clauses, sector regulation (e.g. building safety), licensing terms. "None" if not applicable. (ISO 9001 §8.3.3 design input.)

  - type: textarea
    id: prior_design
    attributes:
      label: Prior-design learning
      description: Have we built something like this before? Any ADR, post-incident review, or earlier issue we should learn from? Link to the relevant artefact. "None" if it's genuinely greenfield. (ISO 9001 §8.3.3 design input.)

  - type: textarea
    id: failure_consequences
    attributes:
      label: Consequences of failure
      description: If this feature is built and then fails in production — what is the impact? (Customer downtime, incorrect telemetry, mis-routed billing, data loss, safety implication, etc.) Sets the bar for the verification / validation effort needed before promotion. (ISO 9001 §8.3.3 design input.)

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: How will we know this is done? Phrase as testable outcomes ("X returns Y given Z" / "user can do W in <2s") — copied into the implementing PR for validation in `dev` before promotion. (ISO 9001 §8.3.5 design output.)
    validations:
      required: true
