# Disable blank issues so every issue uses one of the templates above.
# Contact links provide alternative channels — particularly the private
# Security Advisory flow for actual vulnerabilities.

blank_issues_enabled: false

contact_links:
  - name: Report a security vulnerability (private)
    url: https://security.thrive-ai.co.uk
    about: For actual vulnerabilities in any Thrive product or repo, use the dedicated security disclosure channel at security.thrive-ai.co.uk — NOT a public GitHub issue.

  - name: Customer support
    url: https://support.thrive-ai.co.uk
    about: For customer-facing support queries, please use the Thrive support channel (FreshDesk) rather than filing a GitHub issue.
